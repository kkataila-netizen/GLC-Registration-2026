[build]
  command = "npm install"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["node_modules/@netlify/blobs/**"]

# Home page is the default landing page
[[redirects]]
  from = "/"
  to = "/home.html"
  status = 200

# Redirect API calls to the serverless function
[[redirects]]
  from = "/chat-api/*"
  to = "/.netlify/functions/chat/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
