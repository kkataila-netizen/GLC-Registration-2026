<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLC Chat</title>
  <link rel="stylesheet" href="/css/chat.css">
</head>
<body>

  <!-- Not logged in message -->
  <div id="loginPrompt" class="login-prompt" hidden>
    <p>Please <a href="/" target="_blank">log in</a> first to use chat.</p>
  </div>

  <!-- Main Layout -->
  <div id="app" class="app" hidden>
    <!-- Sidebar: user list -->
    <aside class="sidebar">
      <div class="sidebar__header">
        <span class="sidebar__title">People</span>
      </div>
      <div class="sidebar__search">
        <input type="text" id="userSearch" placeholder="Search people...">
      </div>
      <div id="userList" class="sidebar__list"></div>
    </aside>

    <!-- Chat Area -->
    <main class="chat">
      <!-- Empty state -->
      <div id="chatEmpty" class="chat__empty">
        <div class="chat__empty-icon">💬</div>
        <p>Select someone to start chatting</p>
      </div>

      <!-- Active conversation -->
      <div id="chatActive" class="chat__active" hidden>
        <div class="chat__header">
          <div id="chatTitle" class="chat__title"></div>
          <button id="addPersonBtn" class="chat__add-person" title="Add person to chat">➕</button>
        </div>

        <div id="chatMessages" class="chat__messages"></div>

        <div class="chat__input-area">
          <input type="text" id="msgInput" class="chat__input" placeholder="Type a message...">
          <button id="sendBtn" class="chat__send">Send</button>
        </div>
      </div>
    </main>
  </div>

  <!-- Add People / Create Group Modal -->
  <div id="addPeopleModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal__header">
        <span class="modal__title">Create Group Chat</span>
        <button id="addPeopleClose" class="modal__close">&times;</button>
      </div>
      <div class="modal__body">
        <label class="modal__label">Group name</label>
        <input type="text" id="groupNameInput" class="modal__input" placeholder="e.g. Project Team">
        <label class="modal__label">Add people</label>
        <div id="addPeopleList" class="modal__people-list"></div>
      </div>
      <div class="modal__footer">
        <button id="addPeopleCancel" class="modal__btn modal__btn--cancel">Cancel</button>
        <button id="addPeopleConfirm" class="modal__btn modal__btn--confirm">Create Group</button>
      </div>
    </div>
  </div>

  <script src="/js/chat.js"></script>
</body>
</html>
