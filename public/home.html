<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLC 2026 - Global Leadership Conference</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #395542; }

    .hero {
      position: relative;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.5rem;
      overflow: hidden;
      background: #395542;
    }

    /* Geometric chevron icon */
    .hero__icon {
      position: relative;
      width: 120px;
      height: 160px;
      margin-bottom: 2.5rem;
    }
    .hero__icon .bar {
      position: absolute;
      width: 28px;
      border-radius: 4px;
      transform-origin: center;
    }
    .hero__icon .bar--1 {
      height: 120px;
      background: rgba(255,255,255,0.15);
      transform: rotate(-20deg);
      left: 20px;
      top: 20px;
    }
    .hero__icon .bar--2 {
      height: 130px;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(140,197,224,0.4);
      background: transparent;
      transform: rotate(-20deg);
      left: 46px;
      top: 10px;
    }
    .hero__icon .bar--3 {
      height: 140px;
      background: #8cc5e0;
      transform: rotate(-20deg);
      left: 72px;
      top: 0;
    }

    .hero__headline {
      font-family: 'Libre Franklin', Arial, sans-serif;
      font-size: clamp(3rem, 10vw, 7.5rem);
      font-weight: 300;
      font-style: italic;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -0.02em;
      position: relative;
      margin-bottom: 3rem;
    }

    /* Banyan + GLC lockup */
    .hero__brand {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .hero__brand-name {
      font-family: 'Libre Franklin', Arial, sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .hero__brand-name small {
      display: block;
      font-size: 0.5rem;
      font-weight: 600;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-top: 2px;
    }

    .hero__brand-divider {
      width: 1px;
      height: 32px;
      background: rgba(255,255,255,0.4);
    }

    .hero__brand-conf {
      font-family: 'Libre Franklin', Arial, sans-serif;
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      line-height: 1.4;
      text-align: left;
    }

    .hero__meta {
      font-family: 'Libre Franklin', Arial, sans-serif;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 3rem;
      position: relative;
    }

    .hero__meta span {
      margin: 0 0.625rem;
      opacity: 0.5;
    }

    .hero__cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2.25rem;
      background: #8cc5e0;
      color: #2d3436;
      font-family: 'Libre Franklin', Arial, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s, transform 0.2s;
      position: relative;
    }
    .hero__cta:hover {
      background: #7ab8d4;
      transform: translateY(-1px);
    }

    @media (max-width: 640px) {
      .hero { padding: 2rem 1rem; }
      .hero__icon { width: 80px; height: 110px; margin-bottom: 1.5rem; }
      .hero__icon .bar { width: 20px; }
      .hero__icon .bar--1 { height: 80px; left: 12px; top: 15px; }
      .hero__icon .bar--2 { height: 90px; left: 32px; top: 8px; }
      .hero__icon .bar--3 { height: 95px; left: 52px; top: 0; }
      .hero__brand { flex-direction: column; gap: 0.5rem; }
      .hero__brand-divider { width: 40px; height: 1px; }
      .hero__brand-conf { text-align: center; }
      .hero__meta { font-size: 0.6875rem; }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="/home.html" class="top-nav__brand">
      <div class="top-nav__logo">G</div>
      <span class="top-nav__title">Global Leadership Conference</span>
    </a>
    <ul class="top-nav__links">
      <li><a href="/home.html" class="active">Home</a></li>
      <li><a href="/info.html">Info</a></li>
      <li><a href="/sessions.html">Sessions</a></li>
      <li><a href="/people.html">People</a></li>
      <li><a href="/">Register</a></li>
      <li><a href="/admin.html">Admin</a></li>
    </ul>
  </nav>

  <section class="hero">
    <!-- Geometric chevron icon -->
    <div class="hero__icon">
      <div class="bar bar--1"></div>
      <div class="bar bar--2"></div>
      <div class="bar bar--3"></div>
    </div>

    <h1 class="hero__headline">Future-Forward</h1>

    <!-- Banyan | GLC lockup -->
    <div class="hero__brand">
      <div class="hero__brand-name">banyan<small>SOFTWARE</small></div>
      <div class="hero__brand-divider"></div>
      <div class="hero__brand-conf">Global Leadership<br>Conference</div>
    </div>

    <div class="hero__meta">
      July 14&ndash;16, 2026 <span>&bull;</span> Toronto <span>&bull;</span> Fairmont Royal York
    </div>

    <a href="/" class="hero__cta">Register Now &rarr;</a>
  </section>

  <script src="/js/nav-notify.js"></script>
</body>
</html>
