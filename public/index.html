<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLC Conference Registration</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="top-nav">
    <a href="/" class="top-nav__brand">
      <div class="top-nav__logo">G</div>
      <span class="top-nav__title">Global Leadership Conference</span>
    </a>
    <ul class="top-nav__links">

      <li><a href="/info.html">Info</a></li>
      <li><a href="/sessions.html">Sessions</a></li>
      <li><a href="/people.html">People</a></li>
      <li><a href="/" class="active">Register</a></li>
      <li><a href="/admin.html">Admin</a></li>
    </ul>
  </nav>

  <div class="container">
    <header class="page-header">
      <h1>Registration</h1>
      <p>Global Leadership Conference 2026</p>
    </header>

    <div class="card">
      <form id="registrationForm" novalidate>
        <div class="form-group">
          <label><span class="required">Full Name</span></label>
          <input type="text" id="name" name="name" placeholder="John Doe" autocomplete="name">
        </div>

        <div class="form-group">
          <label><span class="required">Title</span></label>
          <input type="text" id="title" name="title" placeholder="CEO, VP of Operations, etc." autocomplete="organization-title">
        </div>

        <div class="form-group">
          <label>Organization / Company</label>
          <input type="text" id="organization" name="organization" placeholder="Acme Corp" autocomplete="organization">
        </div>

        <div class="form-group">
          <label><span class="required">Email Address</span></label>
          <input type="email" id="email" name="email" placeholder="john@example.com" autocomplete="email">
        </div>

        <div class="form-group">
          <label><span class="required">Password</span></label>
          <input type="password" id="password" name="password" placeholder="Create a password" autocomplete="new-password">
        </div>

        <div class="form-group">
          <label><span class="required">Arrival Date</span></label>
          <input type="date" id="arrivalDate" name="arrivalDate">
        </div>

        <div class="form-group">
          <label><span class="required">Departure Date</span></label>
          <input type="date" id="departureDate" name="departureDate">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" autocomplete="tel">
        </div>

        <div class="form-group">
          <label>Dietary Preferences</label>
          <select id="dietary" name="dietary">
            <option value="None">None</option>
            <option value="Vegetarian">Vegetarian</option>
            <option value="Vegan">Vegan</option>
            <option value="Gluten-free">Gluten-free</option>
            <option value="Halal">Halal</option>
            <option value="Kosher">Kosher</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Sessions / Workshops</label>
          <div class="checkbox-group">
            <label>
              <input type="checkbox" name="sessions" value="Tue: New CEO Workshop on Banyan Operating System">
              <span>Tue: New CEO Workshop on Banyan Operating System</span>
            </label>
            <label>
              <input type="checkbox" name="sessions" value="Tue: Welcome Reception for CEOs & Operating Leaders">
              <span>Tue: Welcome Reception for CEOs &amp; Operating Leaders</span>
            </label>
            <label>
              <input type="checkbox" name="sessions" value="Wed: Sessions & Breakouts">
              <span>Wed: Sessions &amp; Breakouts</span>
            </label>
            <label>
              <input type="checkbox" name="sessions" value="Wed: Evening Social">
              <span>Wed: Evening Social</span>
            </label>
            <label>
              <input type="checkbox" name="sessions" value="Thu: Sessions & Breakouts">
              <span>Thu: Sessions &amp; Breakouts</span>
            </label>
            <label>
              <input type="checkbox" name="sessions" value="Thu: Awards Dinner">
              <span>Thu: Awards Dinner</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>T-Shirt Size</label>
          <select id="tshirt" name="tshirt">
            <option value="">-- Select size --</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Register</button>
      </form>

      <div id="formMessage" class="message" hidden></div>
    </div>

    <!-- Login Section -->
    <div id="loginSection" class="card" style="margin-top:1.5rem">
      <h3 style="font-family:'Libre Franklin',Arial,sans-serif;font-size:1.125rem;font-weight:600;margin-bottom:.25rem">Already registered?</h3>
      <p style="color:var(--text-muted);font-size:.875rem;margin-bottom:1rem">Log in with your email and password.</p>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label><span class="required">Email Address</span></label>
          <input type="email" id="loginEmail" placeholder="john@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label><span class="required">Password</span></label>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-secondary btn-block" id="loginBtn">Log In</button>
      </form>
      <div id="loginMessage" class="message" hidden></div>
    </div>

    <!-- Logged-in state -->
    <div id="loggedInSection" class="card" style="margin-top:1.5rem" hidden>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <p style="font-size:.875rem;color:var(--text-muted)">Logged in as</p>
          <p id="loggedInName" style="font-weight:600;font-size:1.0625rem"></p>
          <p id="loggedInEmail" style="font-size:.8125rem;color:var(--text-muted)"></p>
        </div>
        <button id="logoutBtn" class="btn btn-secondary">Log Out</button>
      </div>
    </div>
  </div>

  <script src="/js/register.js"></script>
  <script src="/js/nav-notify.js"></script>
</body>
</html>
